name: Build Tilepack API

on:
  push:
    branches:
      - main
    paths:
      - "backend/tilepack-api/**"
      - "!backend/tilepack-api/worker/**"
      - "!backend/tilepack-api/chart/**"
  workflow_dispatch:

jobs:
  image-build-and-push:
    uses: hotosm/gh-workflows/.github/workflows/image_build.yml@3.6.0
    with:
      context: backend/tilepack-api/
      image_name: ghcr.io/${{ github.repository }}/tilepack/api
      dockerfile: Dockerfile
