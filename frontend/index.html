<!doctype html>
<html lang="en" class="hot-theme-light wa-theme-default wa-palette-hotosm">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/openaerialmap.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAerialMap</title>

    <!-- Header height token - read by the map container -->
    <style>
      :root {
        --header-height: 56px;
      }
      hot-header:not(:defined) {
        visibility: hidden;
      }
    </style>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;700&family=Barlow:wght@400;500;700&display=swap"
    />

    <!-- WebAwesome base styles (palette + utilities for the html element) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/native.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/utilities.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/themes/default.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
