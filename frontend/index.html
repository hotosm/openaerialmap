<!doctype html>
<html lang="en" class="hot-theme-light wa-theme-default wa-palette-hotosm">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAerialMap</title>

    <!-- Header height token - read by the map container -->
    <style>
      :root {
        --header-height: 56px;
      }
      hot-header:not(:defined) {
        visibility: hidden;
      }
    </style>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;700&family=Barlow:wght@400;500;700&display=swap"
    />

    <!-- WebAwesome (required by hot-header) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/native.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/utilities.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/themes/default.css"
    />
    <script type="importmap">
      {
        "imports": {
          "@awesome.me/webawesome/dist/components/": "https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist-cdn/components/"
        }
      }
    </script>
    <script type="module">
      import "@awesome.me/webawesome/dist/components/button/button.js";
      import "@awesome.me/webawesome/dist/components/badge/badge.js";
      import "@awesome.me/webawesome/dist/components/dropdown/dropdown.js";
    </script>

    <!-- HOT UI (hot-header web component) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@hotosm/ui@0.9.2/dist/style-core.css"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@hotosm/ui@0.9.2/dist/hotosm-ui.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
