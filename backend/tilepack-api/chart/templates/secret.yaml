{{- if .Values.internalTokenSecret.create -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.internalTokenSecret.name -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.internalTokenSecret.name }}
  labels: {{- include "chart.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $existing }}
  # Preserve existing token across upgrades so worker pods in flight
  # don't get invalidated mid-run.
  token: {{ index $existing.data "token" }}
  {{- else if .Values.internalTokenSecret.token }}
  token: {{ .Values.internalTokenSecret.token | b64enc | quote }}
  {{- else }}
  token: {{ randAlphaNum 48 | b64enc | quote }}
  {{- end }}
{{- end }}
