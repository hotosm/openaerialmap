# Local counterpart to chart/templates/configmap.yaml. Keep the two in sync:
# same routes, same cache behavior, same style URL passed to chiitiler.

# Cache rendered PNGs; low-zoom tiles should stay hot.
proxy_cache_path /var/cache/nginx/tms
                 levels=1:2
                 keys_zone=tms_cache:10m
                 max_size=1g
                 inactive=7d
                 use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Local style URL passed to chiitiler on each tile request.
    location = /style.json {
        default_type application/json;
        alias /styles/style.json;
    }

    # PMTiles served from the shared volume so chiitiler can range-fetch over
    # HTTP, mirroring how the prod chart points chiitiler at an S3 URL.
    location = /global-coverage.pmtiles {
        alias /pmtiles/global-coverage.pmtiles;
        default_type application/octet-stream;
        add_header Accept-Ranges bytes;
    }

    # z0-13 coverage via chiitiler; z14+ redirects below.
    location ~ ^/([0-9]|1[0-3])/([0-9]+)/([0-9]+)\.png$ {
        set $zoom_level $1;
        set $x $2;
        set $y $3;

        proxy_cache tms_cache;
        proxy_cache_valid 200 3600s;
        proxy_cache_valid 404 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status;

        # MapLibre requests raster tiles with crossOrigin=anonymous.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        # url=http%3A%2F%2F127.0.0.1%2Fstyle.json
        proxy_pass http://127.0.0.1:3000/tiles/$zoom_level/$x/$y.png?url=http%3A%2F%2F127.0.0.1%2Fstyle.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # z14+ real imagery via TiTiler. The 302 needs CORS too.
    location ~ ^/(1[4-9]|[2-9][0-9])/([0-9]+)/([0-9]+)\.png$ {
        set $zoom_level $1;
        set $x $2;
        set $y $3;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        return 302 https://api.imagery.hotosm.org/raster/collections/openaerialmap/tiles/WebMercatorQuad/$zoom_level/$x/$y.png?assets=visual;
    }

    # Friendly root page with info
    location = / {
        default_type text/html;
        return 200 '
            <!DOCTYPE html>
            <html lang="en">
            <head>
              <meta charset="UTF-8">
              <title>Tile Server</title>
              <style>
                body { font-family: sans-serif; text-align: center; padding: 2rem; }
                h1 { color: #444; }
                code { background: #eee; padding: 0.2rem 0.4rem; border-radius: 4px; }
              </style>
            </head>
            <body>
              <h1>Tile Server</h1>
              <p>This server provides map tiles.</p>
              <p>Request tiles using the format: <code>/z/x/y.png</code></p>
              <p>Example: <a href="/0/0/0.png">/0/0/0.png</a></p>
            </body>
            </html>';
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
