apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
      labels:
        {{- include "chart.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "chart.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # chiitiler is configured via env vars; no config file.
          # Style JSON is fetched per-request from the nginx sidecar over loopback.
          env:
            - name: CHIITILER_PORT
              value: "3000"
            - name: CHIITILER_CACHE_METHOD
              value: {{ .Values.chiitilerCache.method | quote }}
            - name: CHIITILER_CACHE_TTL_SEC
              value: {{ .Values.chiitilerCache.ttlSeconds | quote }}
            - name: CHIITILER_FILECACHE_DIR
              value: {{ .Values.chiitilerCache.dir | quote }}
          ports:
            - name: chiitiler
              containerPort: 3000
              protocol: TCP
          {{- with .Values.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: chiitiler-cache
              mountPath: {{ .Values.chiitilerCache.dir }}
            {{- with .Values.volumeMounts }}
            {{ toYaml . | nindent 12 }}
            {{- end }}
        - name: {{ .Chart.Name }}-nginx
          image: nginx:1.29-alpine
          ports:
            - containerPort: 80
              name: http
          livenessProbe: {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe: {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: style
              mountPath: /styles/style.json
              subPath: style.json
            - name: nginx-cache
              mountPath: /var/cache/nginx/tms
      volumes:
        - name: style
          configMap:
            name: {{ include "chart.fullname" . }}-style
        - name: nginx-conf
          configMap:
            name: {{ include "chart.fullname" . }}-nginx
        - name: chiitiler-cache
          emptyDir:
            sizeLimit: {{ .Values.chiitilerCache.sizeLimit }}
        - name: nginx-cache
          emptyDir:
            sizeLimit: {{ .Values.nginxCache.sizeLimit }}
        {{- with .Values.volumes }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
