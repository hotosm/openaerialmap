apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-style
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  style.json: |
    {
      "version": 8,
      "glyphs": {{ .Values.glyphs.url | quote }},
      "sources": {
        "global-coverage": {
          "type": "vector",
          "tiles": ["pmtiles://{{ .Values.pmtiles.url }}/{z}/{x}/{y}"],
          "minzoom": 0,
          "maxzoom": {{ .Values.pmtiles.maxzoom }}
        }
      },
      "layers": [
        {
          "id": "background",
          "type": "background",
          "paint": { "background-color": "rgba(0,0,0,0)" }
        },
        {
          "id": "density-fill",
          "source": "global-coverage",
          "source-layer": "density",
          "type": "fill",
          "minzoom": 0,
          "maxzoom": 10,
          "paint": {
            "fill-color": [
              "interpolate",
              ["linear"],
              ["get", "count"],
              1, "#cceeff",
              5, "#66b3ff",
              20, "#0066cc",
              50, "#003366"
            ],
            "fill-opacity": 0.7,
            "fill-outline-color": "rgba(255,255,255,0.6)"
          }
        },
        {
          "id": "density-count",
          "source": "global-coverage",
          "source-layer": "density",
          "type": "symbol",
          "minzoom": 2,
          "maxzoom": 10,
          "filter": [">", ["get", "count"], 0],
          "layout": {
            "text-field": ["to-string", ["get", "count"]],
            "text-font": [{{ .Values.glyphs.fontstack | quote }}],
            "text-size": 12,
            "text-allow-overlap": false
          },
          "paint": {
            "text-color": "#0b2545",
            "text-halo-color": "#ffffff",
            "text-halo-width": 1.5
          }
        },
        {
          "id": "coverage-fill",
          "source": "global-coverage",
          "source-layer": "globalcoverage",
          "type": "fill",
          "minzoom": 10,
          "maxzoom": 16,
          "paint": {
            "fill-color": "#00E5FF",
            "fill-opacity": 0.15,
            "fill-outline-color": "#00B0FF"
          }
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-nginx
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  nginx.conf: |
      # Rendered-tile cache. Sized generously so z0-10 (small, always-hit)
      # never gets evicted by z11-15 churn. inactive covers the case where a
      # tile is unused for a while but still valid - LRU-ish.
      proxy_cache_path /var/cache/nginx/tms
                       levels=1:2
                       keys_zone=tms_cache:{{ .Values.nginxCache.keyZoneSize }}
                       max_size={{ .Values.nginxCache.maxSize }}
                       inactive=7d
                       use_temp_path=off;

      server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Serve the MapLibre style JSON to chiitiler over loopback.
        # chiitiler requires a URL for --style; file:// would also work but
        # HTTP over localhost is what the docs assume and matches upstream examples.
        location = /style.json {
            default_type application/json;
            alias /styles/style.json;
        }

        # Zoom 0-15 → chiitiler (cached rendered PNGs)
        location ~ ^/([0-9]|1[0-5])/([0-9]+)/([0-9]+)\.png$ {
            set $zoom_level $1;
            set $x $2;
            set $y $3;

            proxy_cache tms_cache;
            proxy_cache_valid 200 {{ .Values.nginxCache.validSeconds }}s;
            proxy_cache_valid 404 5m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 30s;
            add_header X-Cache-Status $upstream_cache_status;

            # CORS - MapLibre uses crossOrigin=anonymous for raster tiles by
            # default; without ACAO the browser fetches the tile but silently
            # discards it (network 200, nothing rendered). Wildcard is fine
            # here: the pmtiles is public, no auth, no cookies.
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Range" always;
                add_header Access-Control-Max-Age 86400 always;
                return 204;
            }

            # chiitiler accepts ?url=<style-url> per request.
            # http%3A%2F%2F127.0.0.1%2Fstyle.json = http://127.0.0.1/style.json
            proxy_pass http://127.0.0.1:3000/tiles/$zoom_level/$x/$y.png?url=http%3A%2F%2F127.0.0.1%2Fstyle.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_connect_timeout 5s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;
        }

        # Zoom >=16 → redirect to TiTiler (eoAPI) for real imagery
        location ~ ^/(1[6-9]|[2-9][0-9])/([0-9]+)/([0-9]+)\.png$ {
            set $zoom_level $1;
            set $x $2;
            set $y $3;

            return 302 https://api.imagery.hotosm.org/raster/collections/openaerialmap/tiles/WebMercatorQuad/$zoom_level/$x/$y.png?assets=visual;
        }

        # Friendly root page with info
        location = / {
            default_type text/html;
            return 200 '
                <!DOCTYPE html>
                <html lang="en">
                <head>
                  <meta charset="UTF-8">
                  <title>Tile Server</title>
                  <style>
                    body { font-family: sans-serif; text-align: center; padding: 2rem; }
                    h1 { color: #444; }
                    code { background: #eee; padding: 0.2rem 0.4rem; border-radius: 4px; }
                  </style>
                </head>
                <body>
                  <h1>Tile Server</h1>
                  <p>This server provides map tiles.</p>
                  <p>Request tiles using the format: <code>/z/x/y.png</code></p>
                  <p>Example: <a href="/0/0/0.png">/0/0/0.png</a></p>
                </body>
                </html>';
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
      }
