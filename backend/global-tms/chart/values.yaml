image:
  repository: ghcr.io/kanahiro/chiitiler
  tag: v1.21.1
  pullPolicy: IfNotPresent
imagePullSecrets: []
# This is to override the chart name
nameOverride: ""
fullnameOverride: ""

# The vector PMTiles chiitiler renders. Referenced by the style JSON in the
# configmap; chiitiler reads it via HTTP range requests, no local disk needed.
# maxzoom MUST match the tippecanoe --maximum-zoom used by
# backend/global-mosaic/scripts/gen_coverage_vector.py (ZOOM_MAX). MapLibre
# overzooms above this to satisfy the layer maxzoom (16).
pmtiles:
  url: "https://s3.amazonaws.com/oin-hotosm-temp/global-coverage.pmtiles"
  maxzoom: 15

# Glyphs URL for the density-count symbol layer. The default points at a
# public MapLibre-served font endpoint (no SLA, no rate-limit guarantee).
# TODO: self-host fonts alongside the pmtiles - see NOTES.txt.
glyphs:
  url: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf"
  # Font stack referenced by symbol layers. Must be available under the URL
  # above. demotiles.maplibre.org currently serves only "Noto Sans Regular"
  # and "Noto Sans Bold" - other fontstacks (Open Sans, Roboto, Metropolis)
  # 404. Verify with:
  #   curl -sI "https://demotiles.maplibre.org/font/<stack>/0-255.pbf"
  fontstack: "Noto Sans Bold"

# chiitiler's source-asset cache (pmtiles ranges, glyphs, sprites).
# emptyDir keeps things simple - cleared on pod restart, warms back up
# alongside the nginx rendered-tile cache.
#
# TTL is 1h intentionally, NOT 24h. Cache invalidation reality:
# - Nginx PNG cache and chiitiler file cache are TTL-bounded, so they self-
#   expire within 1h of a pmtiles refresh.
# - chiitiler holds an in-memory PMTiles directory index that only clears on
#   PROCESS RESTART. If S3 content changes under the same key, the cached
#   offsets no longer match the file and byte-range reads return garbage.
#
# Therefore a daily pod restart is REQUIRED for correctness (see NOTES.txt).
# The 1h TTL just narrows the window where non-restart-triggered content
# updates would serve stale output.
chiitilerCache:
  method: file
  dir: /cache/chiitiler
  ttlSeconds: 3600
  sizeLimit: 500Mi

# nginx caches the final rendered PNGs. Biggest perf lever after chiitiler
# renders each tile once. 1h TTL bounds staleness between the mosaic upload
# and the daily rollout restart (see NOTES.txt).
nginxCache:
  sizeLimit: 1Gi
  keyZoneSize: 10m
  maxSize: 1g
  validSeconds: 3600

# The Service in service.yaml is hardcoded to nginx port 80.
# `type` is the only knob that flows through from here.
service:
  type: ClusterIP

ingress:
  enabled: true
  className: nginx
  host: global.imagery.hotosm.org
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: global.imagery.hotosm.org
    external-dns.alpha.kubernetes.io/ttl: "300"
  tls:
    enabled: true
    secretName: oam-global-tms-tls

replicaCount: 1

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 5

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
