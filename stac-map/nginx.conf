server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression: brotli when the client supports it, gzip otherwise.
    # wasm bundles are the biggest win here (~4x smaller over the wire).
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types application/wasm application/javascript application/json
               application/ld+json application/geo+json application/vnd.geo+json
               application/x-ndjson application/xml text/xml text/css text/csv
               text/plain image/svg+xml font/woff2;

    brotli on;
    brotli_comp_level 5;
    brotli_min_length 256;
    brotli_types application/wasm application/javascript application/json
                 application/ld+json application/geo+json application/vnd.geo+json
                 application/x-ndjson application/xml text/xml text/html text/css
                 text/csv text/plain image/svg+xml font/woff2;

    # Long cache for hashed Vite asset bundles (JS, CSS, wasm, workers).
    location /map/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback: unknown routes under /map/ serve index.html so
    # client-side routing works on deep links / refresh.
    location /map/ {
        try_files $uri $uri/ /map/index.html;
    }

    # Convenience: bare host hits redirect into the app.
    location = / {
        return 302 /map/;
    }
}
