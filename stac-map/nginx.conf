server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed Vite asset bundles.
    location /map/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown routes under /map/ serve index.html so
    # client-side routing works on deep links / refresh.
    location /map/ {
        try_files $uri $uri/ /map/index.html;
    }

    # Convenience: bare host hits redirect into the app.
    location = / {
        return 302 /map/;
    }
}
